name: CI

on:
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - CLAUDE.md
      - README.md
      - TODO.md
      - .github/workflows/ci.yml
      - .github/workflows/db-bootstrap.yml
      - .gitignore
      - .pre-commit-config.yaml
      - package.json
      - package-lock.json
      - prisma/**
      - app/**
      - lib/**
      - tests/**
      - docs/**
      - infra/**
  pull_request:
    paths:
      - AGENTS.md
      - CLAUDE.md
      - README.md
      - TODO.md
      - .github/workflows/ci.yml
      - .github/workflows/db-bootstrap.yml
      - .gitignore
      - .pre-commit-config.yaml
      - package.json
      - package-lock.json
      - prisma/**
      - app/**
      - lib/**
      - tests/**
      - docs/**
      - infra/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://localhost:5432/placeholder
