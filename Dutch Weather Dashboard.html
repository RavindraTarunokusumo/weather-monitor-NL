  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .briefing-pill {
      position: absolute; top: 0; left: 0;

      padding: 0 14px 0 12px;

      background: none;
      white-space: nowrap;
      opacity: 1;

      pointer-events: auto;
      cursor: pointer;

    .briefing-collapsible.open .briefing-pill {

    }

<script type="text/babel">




const { useState, useEffect, useRef, useCallback } = React;

// ─── API DATA ADAPTER ───────────────────────────────────────────────────────
const SOURCE_LABELS = {
  mock_knmi: 'Mock KNMI',
  mock_luchtmeetnet: 'Mock Luchtmeetnet',
  mock_rijkswaterstaat: 'Mock Rijkswaterstaat',
  knmi: 'KNMI',
  luchtmeetnet: 'Luchtmeetnet',
  rijkswaterstaat: 'Rijkswaterstaat'
};

function fallback(value, fallbackText = 'Unavailable') {
  return value === null || value === undefined || value === '' ? fallbackText : value;
}

function numeric(value, fallbackValue = 0) {
  return typeof value === 'number' && Number.isFinite(value) ? value : fallbackValue;
}

function titleCase(value, fallbackText = 'Unavailable') {
  const text = String(fallback(value, fallbackText));
  return text ? text.charAt(0).toUpperCase() + text.slice(1) : fallbackText;
}

function probabilityToPercent(value) {
  if (typeof value !== 'number') return 0;
  return value <= 1 ? Math.round(value * 100) : Math.round(value);
}

function formatApiTime(value, timezone = 'Europe/Amsterdam') {
  if (!value) return 'Unavailable';
  return new Intl.DateTimeFormat('en-NL', {
    hour: '2-digit',
    minute: '2-digit',
    timeZone: timezone
  }).format(new Date(value));
}

function parseOutlookHour(value, index) {
  const hour = Number.parseInt(String(value ?? index), 10);
  if (!Number.isFinite(hour)) return index;
  if (hour === 0 && index > 0) return 24;
  return Math.max(0, Math.min(24, hour));
}

function interpolateHourlyMetric(samples, hour, key) {
  const exact = samples.find((sample) => sample.hour === hour);
  if (exact) return exact[key];

  const lower = [...samples].reverse().find((sample) => sample.hour < hour);
  const upper = samples.find((sample) => sample.hour > hour);
  if (!lower && !upper) return 0;
  if (!lower) return upper[key];
  if (!upper) return lower[key];

  const progress = (hour - lower.hour) / (upper.hour - lower.hour);
  return lower[key] + (upper[key] - lower[key]) * progress;
}

function buildHourlyBins(input) {
  const samples = (input || [])
    .map((item, index) => ({
      hour: parseOutlookHour(item.h, index),
      rain: numeric(item.rain),
      wind: numeric(item.wind),
      temp: numeric(item.temp)
    }))
    .sort((a, b) => a.hour - b.hour);

  return Array.from({ length: 24 }, (_, hour) => ({
    h: String(hour).padStart(2, '0'),
    rain: interpolateHourlyMetric(samples, hour, 'rain'),
    wind: interpolateHourlyMetric(samples, hour, 'wind'),
    temp: interpolateHourlyMetric(samples, hour, 'temp')
  }));
}

function niceAxisMax(value, tickCount = 4) {
  if (!Number.isFinite(value) || value <= 0) return tickCount;
  const rawStep = value / tickCount;
  const magnitude = 10 ** Math.floor(Math.log10(rawStep));
  const fraction = rawStep / magnitude;
  const niceFraction = fraction <= 1 ? 1 : fraction <= 2 ? 2 : fraction <= 2.5 ? 2.5 : fraction <= 5 ? 5 : 10;
  const step = niceFraction * magnitude;
  return Math.max(step * tickCount, Math.ceil(value / step) * step);
}

function paddedDomain(values, padding = 1, minimumSpan = 4) {
  const finite = values.filter((value) => Number.isFinite(value));
  if (finite.length === 0) return { min: 0, max: minimumSpan };

  let min = Math.min(...finite) - padding;
  let max = Math.max(...finite) + padding;
  const span = max - min;
  if (span < minimumSpan) {
    const midpoint = (min + max) / 2;
    min = midpoint - minimumSpan / 2;
    max = midpoint + minimumSpan / 2;
  }

  return {
    min: Math.floor(min),
    max: Math.ceil(max)
  };
}

function chartTicks(min, max, tickCount = 4) {
  const step = (max - min) / tickCount;
  return Array.from({ length: tickCount + 1 }, (_, index) => min + step * index);
}

function formatAxisNumber(value) {
  const rounded = Math.round(value * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
}

function mapDashboardResponse(data) {
  const timezone = data.city?.timezone || 'Europe/Amsterdam';
  const risk = titleCase(data.water_signal?.risk_label, 'Unknown');
  const summary = data.ui_summary || {};
  const sources = Array.isArray(data.source_freshness) ? data.source_freshness : [];

  return {
    slug: data.city?.slug || 'amsterdam',
    name: data.city?.name || 'Amsterdam',
    timezone,
    temp: numeric(data.current?.temperature_c),
    feelsLike: numeric(data.current?.feels_like_c),
    rain: numeric(data.current?.rain_mm),
    rainProb: probabilityToPercent(data.current?.rain_probability),
    wind: numeric(data.current?.wind_speed_kmh),
    gust: numeric(data.current?.wind_gust_kmh),
    windDir: String(fallback(data.current?.wind_direction, '')),
    condition: String(fallback(data.current?.condition_label, 'Condition unavailable')),
    cycleScore: numeric(data.cycle_comfort?.score),
    cycleLabel: titleCase(data.cycle_comfort?.label, 'Cycle score unavailable'),
    bestWindow: String(fallback(data.cycle_comfort?.best_outdoor_window || summary.best_window)),
    worstWindow: String(fallback(data.cycle_comfort?.worst_outdoor_window)),
    aqi: numeric(data.air_quality?.aqi_value),
    aqiLabel: titleCase(data.air_quality?.label, 'AQI unavailable'),
    pm25: numeric(data.air_quality?.pollutants?.pm25),
    pm10: numeric(data.air_quality?.pollutants?.pm10),
    no2: numeric(data.air_quality?.pollutants?.no2),
    o3: numeric(data.air_quality?.pollutants?.o3),
    so2: numeric(data.air_quality?.pollutants?.so2),
    waterLevel: numeric(data.water_signal?.water_level_cm),
    waterTrend: String(fallback(data.water_signal?.trend, 'stable')),
    waterRisk: risk,
    briefing: String(fallback(data.briefing, 'Dashboard briefing unavailable.')),
    aiSummary: [
      {
        icon: '☀️',
        color: '#0f766e',
        label: 'Best outdoor window',
        value: String(fallback(summary.best_window || data.cycle_comfort?.best_outdoor_window)),
        text: String(fallback(summary.outdoor_window_detail, 'Outdoor timing detail unavailable.'))
      },
      {
        icon: '⚠️',
        color: '#b45309',
        label: 'Main risk',
        value: String(fallback(summary.main_risk, 'No known risk')),
        text: String(fallback(summary.risk_detail, 'Risk detail unavailable.'))
      },
      {
        icon: '↑',
        color: '#1d4ed8',
        label: 'What changed',
        value: String(fallback(summary.changed, 'No change data')),
        text: String(fallback(summary.changed_detail, 'Change detail unavailable.'))
      }
    ],
    hourly: buildHourlyBins(data.outlook?.hourly),
    weekly: (data.outlook?.weekly || []).map((item) => ({
      day: item.day || '--',
      hi: numeric(item.hi),
      lo: numeric(item.lo),
      rain: probabilityToPercent(item.rain)
    })),
    waterWeekly: Array.isArray(data.water_signal?.weekly_levels_cm) ? data.water_signal.weekly_levels_cm : [],
    sources: (sources.length > 0 ? sources : [{ source: 'dashboard', updated_at: data.generated_at }]).map((source) => ({
      name: SOURCE_LABELS[source.source] || source.source,
      time: formatApiTime(source.updated_at, timezone)
    })),
    generatedAt: data.generated_at
  };
}

function getAnswer(city, question) {
  const q = question.toLowerCase();
  if (q.includes('rain') || q.includes('umbrella')) {
    return `${city.name} has ${city.rainProb}% rain chance with ${city.rain.toFixed(1)} mm recorded.`;
  }
  if (q.includes('cycl') || q.includes('bike') || q.includes('biking')) {
    return `${city.name} cycle comfort is ${city.cycleScore}/100 (${city.cycleLabel}). Best window: ${city.bestWindow}.`;
  }
  if (q.includes('wind') || q.includes('tomorrow')) {
    return `${city.name} wind is ${city.wind} km/h from ${city.windDir}, with gusts up to ${city.gust} km/h.`;
  }
  if (q.includes('weekend') || q.includes('saturday') || q.includes('sunday')) {
    const weekend = city.weekly.slice(-2).map((day) => `${day.day} ${day.rain}% rain`).join(', ');
    return weekend ? `Weekend outlook: ${weekend}.` : 'Weekend outlook data is unavailable.';
  }
  return `${city.name}: ${city.temp.toFixed(1)}°C, ${city.condition}, ${city.rainProb}% rain chance. Best outdoor time is ${city.bestWindow}.`;
}

// ─── BRAND LOGO ─────────────────────────────────────────────────────────────
const DWILogo = ({ size = 32 }) =>

// ─── WEATHER CONDITION ICONS (real images from brand sheet) ─────────────────

// ─── METRIC BADGE ICONS (real images) ────────────────────────────────────────
const METRIC_ICON_SRC = {

const IconPin = () =>

    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" />

const IconStar = () =>

// ─── COMBINED CHART (all metrics shown simultaneously) ─────────────────────
function CombinedChart({ data }) {
  const chartData = buildHourlyBins(data);
  const W = 720,H = 220;
  const PAD = { top: 14, right: 62, bottom: 30, left: 36 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;

  const temps = chartData.map((d) => d.temp);
  const rains = chartData.map((d) => d.rain);
  const winds = chartData.map((d) => d.wind);
  const tempDomain = paddedDomain(temps, 1, 4);
  const tMin = tempDomain.min,tMax = tempDomain.max;
  const rMax = niceAxisMax(Math.max(...rains, 0), 4);
  const wMax = niceAxisMax(Math.max(...winds, 0), 4);
  const rainTicks = chartTicks(0, rMax, 4);
  const windTicks = chartTicks(0, wMax, 4);
  const tempTicks = chartTicks(tMin, tMax, 4);

  const xScale = (i) => PAD.left + i / (chartData.length - 1) * innerW;
  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
  const yScaleT = (v) => PAD.top + innerH - (clamp(v, tMin, tMax) - tMin) / (tMax - tMin) * innerH;
  const yScaleR = (v) => PAD.top + innerH - clamp(v, 0, rMax) / rMax * innerH;
  const yScaleW = (v) => PAD.top + innerH - clamp(v, 0, wMax) / wMax * innerH;

  // smooth curve generator
  const smoothPath = (vals, scale) => {
    const pts = vals.map((v, i) => [xScale(i), scale(v)]);
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const [x0, y0] = pts[i - 1];
      const [x1, y1] = pts[i];
      const cx = (x0 + x1) / 2;
      d += ` C ${cx} ${y0}, ${cx} ${y1}, ${x1} ${y1}`;
    }
    return d;
  };

  const barW = Math.max(8, innerW / chartData.length * 0.65);
  const labelHours = new Set([0, 3, 6, 9, 12, 15, 18, 21, 23]);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: '100%', display: 'block', overflow: 'visible' }}>
      {/* horizontal grid */}
      {rainTicks.map((v) => {
        const y = yScaleR(v);
        return <line key={`grid${v}`} x1={PAD.left} y1={y} x2={PAD.left + innerW} y2={y} stroke="#e5e7eb" strokeWidth="1" />;
      })}

      {/* Rain bars */}
      {rains.map((r, i) => {
        const barY = yScaleR(r);
        const barH = PAD.top + innerH - barY;
        return (
          <rect key={i} x={xScale(i) - barW / 2} y={barY} width={barW} height={Math.max(barH, 1)}
          fill="#94a3d4" fillOpacity="0.78" rx="1.5">
            <title>{`${chartData[i].h}:00 — ${r.toFixed(0)}% rain chance`}</title>
          </rect>);

      })}

      {/* Wind line (teal) */}
      <path d={smoothPath(winds, yScaleW)} fill="none" stroke="#14b8a6" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />

      {/* Temp line (orange) */}
      <path d={smoothPath(temps, yScaleT)} fill="none" stroke="#f97316" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />

      {/* Left y-axis: rain mm */}
      {rainTicks.map((v) => {
        const y = yScaleR(v);
        return <text key={`l${v}`} x={PAD.left - 14} y={y + 4} textAnchor="end" fill="#6b7280" fontSize="11" fontFamily="var(--sans)">{formatAxisNumber(v)}</text>;
      })}

      {/* Right y-axis: wind (teal, inner) */}
      {windTicks.slice(1).map((v) => {
        const y = yScaleW(v);
        return <text key={`w${v}`} x={PAD.left + innerW + 14} y={y + 4} textAnchor="start" fill="#14b8a6" fontSize="11" fontFamily="var(--sans)">{formatAxisNumber(v)}</text>;
      })}

      {/* Right y-axis: temp (orange, outer) */}
      {tempTicks.map((v) => {
        const y = yScaleT(v);
        return <text key={`t${v}`} x={PAD.left + innerW + 44} y={y + 4} textAnchor="start" fill="#f97316" fontSize="11" fontFamily="var(--sans)">{formatAxisNumber(v)}°</text>;
      })}

      {/* X axis labels — every 3 hours */}
      {chartData.map((d, i) => {
        if (!labelHours.has(i)) return null;
        return <text key={i} x={xScale(i)} y={H - 6} textAnchor="middle" fill="#6b7280" fontSize="11" fontFamily="var(--sans)">{d.h}:00</text>;
      })}
    </svg>);

}

// ─── CHART (legacy single-metric, kept for fallback) ───────────────────────
function MiniChart({ data, view, metric }) {
  const W = 580,H = 170;
  const PAD = { top: 22, right: 20, bottom: 32, left: 56 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;

  const temps = data.map((d) => d.temp);
  const rains = data.map((d) => d.rain);
  const winds = data.map((d) => d.wind);
  const tMin = Math.min(...temps) - 1,tMax = Math.max(...temps) + 1;
  const rMax = Math.max(...rains, 1);
  const wMax = Math.max(...winds, 10);

  const xScale = (i) => PAD.left + i / (data.length - 1) * innerW;
  const yScaleT = (v) => PAD.top + innerH - (v - tMin) / (tMax - tMin) * innerH;
  const yScaleR = (v) => PAD.top + innerH - v / rMax * innerH;
  const yScaleW = (v) => PAD.top + innerH - v / wMax * innerH;

  const linePath = (vals, scale) =>
  vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i)} ${scale(v)}`).join(' ');

  const areaPath = (vals, scale) => {
    const pts = vals.map((v, i) => `${xScale(i)} ${scale(v)}`).join(' L ');
    return `M ${xScale(0)} ${PAD.top + innerH} L ${pts} L ${xScale(vals.length - 1)} ${PAD.top + innerH} Z`;
  };

  const barW = Math.max(4, innerW / data.length * 0.55);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: '100%', display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id="rainGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.3" />
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.02" />
        </linearGradient>
        <linearGradient id="windGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#22c55e" stopOpacity="0.15" />
          <stop offset="100%" stopColor="#22c55e" stopOpacity="0" />
        </linearGradient>
      </defs>

      {/* Grid lines */}
      {[0, 0.25, 0.5, 0.75, 1].map((t) => {
        const y = PAD.top + innerH * (1 - t);
        return <line key={t} x1={PAD.left} y1={y} x2={PAD.left + innerW} y2={y} stroke="var(--border)" strokeWidth="0.8" strokeDasharray="4 3" />;
      })}

      {/* Rain bars */}
      <g style={{ opacity: metric === 'rain' ? 1 : 0, transition: 'opacity 0.45s ease', pointerEvents: metric === 'rain' ? 'auto' : 'none' }}>
      {rains.map((r, i) => {
          const barH = r / rMax * innerH;
          const barY = PAD.top + innerH - barH;
          return (
            <g key={i}>
          <rect
                x={xScale(i) - barW / 2}
                y={barY}
                width={barW} height={Math.max(barH, 1)}
                fill="#3b82f6" fillOpacity="0.55" rx="2"
                style={{ transition: 'y 0.45s ease, height 0.45s ease, fill-opacity 0.15s' }}
                onMouseEnter={(e) => e.target.setAttribute('fill-opacity', '0.95')}
                onMouseLeave={(e) => e.target.setAttribute('fill-opacity', '0.55')}>
            <title>{`${data[i].h} — ${r.toFixed(1)} mm`}</title>
          </rect>
          <text x={xScale(i)} y={barY - 4} textAnchor="middle" fill="#3b82f6" fontSize="9" fontFamily="var(--mono)" fontWeight="600">{r.toFixed(1)}</text>
          </g>);
        })}
      </g>

      {/* Wind area */}
      <g style={{ opacity: metric === 'wind' ? 1 : 0, transition: 'opacity 0.45s ease', pointerEvents: metric === 'wind' ? 'auto' : 'none' }}>
      <path d={areaPath(winds, yScaleW)} fill="url(#windGrad)" style={{ transition: 'd 0.45s ease' }} />
      <path d={linePath(winds, yScaleW)} fill="none" stroke="#22c55e" strokeWidth="2" strokeLinejoin="round" style={{ transition: 'd 0.45s ease' }} />
      {winds.map((w, i) =>
        <g key={i}>
      <circle cx={xScale(i)} cy={yScaleW(w)} r="3" fill="#22c55e" stroke="var(--surface)" strokeWidth="1.5"
          style={{ transition: 'cy 0.45s ease, r 0.15s' }}
          onMouseEnter={(e) => e.target.setAttribute('r', '5')}
          onMouseLeave={(e) => e.target.setAttribute('r', '3')}>
        <title>{`${data[i].h} — ${Math.round(w)} km/h`}</title>
      </circle>
      <text x={xScale(i)} y={yScaleW(w) - 7} textAnchor="middle" fill="#22c55e" fontSize="9" fontFamily="var(--mono)" fontWeight="600">{Math.round(w)}</text>
      </g>
        )}
      </g>

      {/* Temp line */}
      <g style={{ opacity: metric === 'temp' ? 1 : 0, transition: 'opacity 0.45s ease', pointerEvents: metric === 'temp' ? 'auto' : 'none' }}>
      <path d={areaPath(temps, yScaleT)} fill="rgba(249,115,22,0.08)" style={{ transition: 'd 0.45s ease' }} />
      <path d={linePath(temps, yScaleT)} fill="none" stroke="#f97316" strokeWidth="2.2" strokeLinejoin="round" style={{ transition: 'd 0.45s ease' }} />
      {temps.map((t, i) =>
        <g key={i}>
      <circle cx={xScale(i)} cy={yScaleT(t)} r="3" fill="#f97316" stroke="var(--surface)" strokeWidth="1.5"
          style={{ transition: 'cy 0.45s ease, r 0.15s' }}
          onMouseEnter={(e) => e.target.setAttribute('r', '5')}
          onMouseLeave={(e) => e.target.setAttribute('r', '3')}>
        <title>{`${data[i].h} — ${t.toFixed(1)}°C`}</title>
      </circle>
      <text x={xScale(i)} y={yScaleT(t) - 7} textAnchor="middle" fill="#f97316" fontSize="9" fontFamily="var(--mono)" fontWeight="600">{t.toFixed(0)}</text>
      </g>
        )}
      </g>

      {/* X axis labels */}
      {data.map((d, i) =>
      <text key={i} x={xScale(i)} y={H - 6} textAnchor="middle" fill="var(--muted)" fontSize="10" fontFamily="var(--mono)">{d.h}</text>
      )}

      {/* Single y-axis — fades to match active metric */}
      <g style={{ opacity: metric === 'rain' ? 1 : 0, transition: 'opacity 0.35s ease' }}>
        <text x={PAD.left - 16} y={PAD.top - 8} textAnchor="end" fill="#3b82f6" fontSize="9" fontWeight="700">mm</text>
        {[0, 0.5, 1].map((t) => {
          const v = (rMax * t).toFixed(rMax < 2 ? 1 : 0);
          const y = PAD.top + innerH - innerH * t;
          return <text key={`r${t}`} x={PAD.left - 16} y={y + 3} textAnchor="end" fill="#3b82f6" fontSize="10" fontFamily="var(--mono)">{v}</text>;
        })}
      </g>
      <g style={{ opacity: metric === 'temp' ? 1 : 0, transition: 'opacity 0.35s ease' }}>
        <text x={PAD.left - 8} y={PAD.top - 8} textAnchor="end" fill="#f97316" fontSize="9" fontWeight="700">°C</text>
        {[0, 0.5, 1].map((t) => {
          const v = Math.round(tMin + (tMax - tMin) * t);
          const y = PAD.top + innerH - innerH * t;
          return <text key={`t${t}`} x={PAD.left - 8} y={y + 3} textAnchor="end" fill="#f97316" fontSize="10" fontFamily="var(--mono)">{v}</text>;
        })}
      </g>
      <g style={{ opacity: metric === 'wind' ? 1 : 0, transition: 'opacity 0.35s ease' }}>
        <text x={PAD.left - 8} y={PAD.top - 8} textAnchor="end" fill="#22c55e" fontSize="9" fontWeight="700">km/h</text>
        {[0, 0.5, 1].map((t) => {
          const v = Math.round(wMax * t);
          const y = PAD.top + innerH - innerH * t;
          return <text key={`w${t}`} x={PAD.left - 8} y={y + 3} textAnchor="end" fill="#22c55e" fontSize="10" fontFamily="var(--mono)">{v}</text>;
        })}
      </g>
    </svg>);

}

// ─── WATER SPARKLINE ─────────────────────────────────────────────────────────
function WaterSparkline({ data, activeIdx }) {
  const W = 260,H = 56;
  const pad = { l: 10, r: 10, t: 8, b: 24 };
  const iW = W - pad.l - pad.r,iH = H - pad.t - pad.b;
  const min = Math.min(...data) - 2,max = Math.max(...data) + 2;
  const days = ['Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun', 'Mon'];
  const x = (i) => pad.l + i / (data.length - 1) * iW;
  const y = (v) => pad.t + iH - (v - min) / (max - min) * iH;
  const path = data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(v)}`).join(' ');

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: H, display: 'block' }}>
      <defs>
        <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.2" />
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={path + ` L ${x(data.length - 1)} ${pad.t + iH} L ${x(0)} ${pad.t + iH} Z`} fill="url(#waterGrad)" />
      <path d={path} fill="none" stroke="#3b82f6" strokeWidth="1.8" strokeLinejoin="round" strokeDasharray="5 3" />
      {data.map((v, i) =>
      <circle key={i} cx={x(i)} cy={y(v)} r={i === activeIdx ? 4 : 2.5}
      fill={i === activeIdx ? "#1d4ed8" : "#3b82f6"}
      stroke={i === activeIdx ? "var(--surface)" : "none"} strokeWidth="1.5" />
      )}
      {days.map((d, i) =>
      <text key={i} x={x(i)} y={H - 2} textAnchor="middle" fontSize="9" fill={i === activeIdx ? "#1d4ed8" : "var(--muted)"} fontFamily="var(--mono)">{d}</text>
      )}
    </svg>);

}

// ─── CYCLE DONUT ─────────────────────────────────────────────────────────────
function CycleDonut({ score, size = 110 }) {
  const r = 44,cx = 56,cy = 56;
  const circ = 2 * Math.PI * r;
  const filled = circ * (score / 100);
  const scoreColor = score >= 75 ? '#16a34a' : score >= 50 ? '#0f766e' : '#b45309';
  return (
    <svg viewBox="0 0 112 112" width={size} height={size} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e8f0ea" strokeWidth="9" />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={scoreColor} strokeWidth="9"
      strokeDasharray={`${filled} ${circ}`}
      strokeLinecap="round"
      transform={`rotate(-90 ${cx} ${cy})`} />
      <text x={cx} y={cy + 6} textAnchor="middle" fontSize="28" fontWeight="800" fill="#0f1c2e" fontFamily="var(--mono)">{score}</text>
      <text x={cx} y={cy + 22} textAnchor="middle" fontSize="10" fill="var(--muted)" fontFamily="var(--sans)">/100</text>
    </svg>);

}

// ─── VIEWPORT HOOK ──────────────────────────────────────────────────────────
function useViewport() {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    const onR = () => setW(window.innerWidth);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  return { w, isMobile: w < 640, isTablet: w >= 640 && w < 1024, isDesktop: w >= 1024 };
}

  return {
    tweaks,

  };
});
const TweaksPanel = window.TweaksPanel || (() => null);
const TweakSection = window.TweakSection || (({ children }) => <>{children}</>);
const TweakToggle = window.TweakToggle || (() => null);
const TweakColor = window.TweakColor || (() => null);
const TweakRadio = window.TweakRadio || (() => null);

                    display: 'flex', alignItems: 'center', justifyContent: 'center'
                  }}>
                    <MetricIcon type="wave" size={28} />
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>{city.waterRisk}</div>
                    <div style={{ fontSize: 10, color: 'var(--muted)' }}>{city.waterRisk === 'Normal' ? 'All clear' : 'Alert'}</div>
                  </div>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <WaterSparkline data={city.waterWeekly} activeIdx={3} />
                </div>
              </div>

              <div style={{ fontSize: 11, color: 'var(--muted)' }}>
                {city.waterRisk === 'Normal' ?
                'No flood or high water risks in the area.' :
                'Elevated water level — monitoring closely.'}
              </div>
            </div>
          </div>
        </div>

        {/* ── SOURCE FRESHNESS ── */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: isMobile ? 8 : 16,
          flexWrap: 'wrap',
          marginTop: 14, padding: '14px 4px',
          fontSize: 12, color: 'var(--muted)'
        }}>
          <span style={{ color: 'var(--muted)' }}>Data sources:</span>
          {city.sources.map((s, i) =>
          <React.Fragment key={i}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontWeight: 700, color: 'var(--text)' }}>{s.name}</span>
                <span style={{ color: 'var(--muted)' }}>Updated</span>
                <span style={{ fontFamily: 'var(--mono)', color: 'var(--text)', fontWeight: 500 }}>{s.time}</span>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#16a34a', flexShrink: 0 }} />
              </div>
              {i < city.sources.length - 1 && <span style={{ color: 'var(--border)' }}>|</span>}
            </React.Fragment>
          )}
          <div style={{ marginLeft: 'auto', color: 'var(--muted)', fontSize: 11 }}>All times in CEST</div>
        </div>

      </main>
      }

      <TweaksPanel tweaks={safeTweaks} setTweak={setTweak}>
        <TweakSection title="Display">
          <TweakToggle label="Dark mode" tweakKey="darkMode" tweaks={safeTweaks} setTweak={setTweak} />
          <TweakToggle label="Show cycle widget" tweakKey="showCycleWidget" tweaks={safeTweaks} setTweak={setTweak} />
        </TweakSection>
        <TweakSection title="Style">
          <TweakColor label="Accent color" tweakKey="accentColor" tweaks={safeTweaks} setTweak={setTweak} />
        </TweakSection>
        <TweakSection title="Default city">
          <TweakRadio label="City" tweakKey="defaultCity" tweaks={safeTweaks} setTweak={setTweak}
          options={cityOptions.map((option) => ({ label: option.name, value: option.slug }))} />
        </TweakSection>
      </TweaksPanel>
    </div>);

}

// helper so JSX doesn't break on CSS vars
const var_radius = '10px';

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
