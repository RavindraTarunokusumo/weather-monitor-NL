services:
  postgres:
    image: postgres:16
    container_name: dutch_weather_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dutch_weather}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dutch_weather_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dutch_weather"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dutch_weather_postgres_data:
